name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.13']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest ast-grep-cli

      - name: Verify ast-grep
        run: sg --version

      - name: Run hooks + telemetry tests
        shell: bash
        run: |
          set +e
          python -m pytest hooks/tests telemetry/tests -v --tb=long 2>&1 | tee pytest.log
          code=${PIPESTATUS[0]}
          if [ $code -ne 0 ]; then
            {
              echo "## pytest failure on ${{ matrix.os }} / Python ${{ matrix.python-version }}"
              echo ""
              echo '```'
              tail -200 pytest.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          exit $code
